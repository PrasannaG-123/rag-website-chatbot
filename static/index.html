<!DOCTYPE html>
<html>
<head>
    <title>Website AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Website AI Assistant</h1>

    <div class="url-section">

        <input id="urlBox" placeholder="Enter website URL">

        <button onclick="processWebsite()">Process</button>

        <p id="status">Waiting...</p>

    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="question-section">

        <input id="questionBox" placeholder="Ask anything">

        <button onclick="askQuestion()">Send</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
