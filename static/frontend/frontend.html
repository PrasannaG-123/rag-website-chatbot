<!DOCTYPE html>
<html lang="en">

<head>
    <title>AI Website RAG Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    background:#0f172a;
    height:100vh;
}

/* MAIN LAYOUT */

.app{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:280px;
    background:#111827;
    color:white;
    padding:20px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

.new-chat{
    background:#2563eb;
    border:none;
    padding:12px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    margin-bottom:20px;
}

.chat-history{
    flex:1;
    overflow-y:auto;
}

.history-item{
    background:#1f2937;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.history-item:hover{
    background:#374151;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    background:#f8fafc;
}

/* HEADER */

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.header h2{
    margin-bottom:5px;
}

/* URL SECTION */

.top-section{
    padding:20px;
    border-bottom:1px solid #ddd;
    background:white;
}

/* PDF SECTION */

.pdf-section{
    padding:20px;
    display:flex;
    gap:15px;
    border-bottom:1px solid #ddd;
    background:white;
}

#pdfFile{
    flex:1;
    margin:0;
}

/* INPUTS */

input{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    margin-bottom:10px;
    font-size:16px;
}

/* BUTTONS */

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    font-size:15px;
}

button:hover{
    opacity:0.9;
}

button:disabled{
    background:gray;
}

#status{
    margin-top:10px;
    font-weight:bold;
    color:green;
}

/* CHAT */

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin-bottom:20px;
    max-width:75%;
    padding:15px;
    border-radius:12px;
    white-space:pre-wrap;
    line-height:1.6;
}

.user{
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.ai{
    background:white;
    border:1px solid #ddd;
}

/* BOTTOM CHAT INPUT */

.bottom{
    padding:20px;
    display:flex;
    gap:10px;
    border-top:1px solid #ddd;
    background:white;
}

#questionBox{
    flex:1;
    margin:0;
}

/* TYPING */

.typing-dots span{
    animation: blink 1.4s infinite;
    font-size:22px;
}

.typing-dots span:nth-child(2){
    animation-delay:0.2s;
}

.typing-dots span:nth-child(3){
    animation-delay:0.4s;
}

@keyframes blink{
    0%{opacity:0.2;}
    20%{opacity:1;}
    100%{opacity:0.2;}
}

</style>
</head>


<body>

<div class="app">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            AI Chatbot
        </div>

        <button class="new-chat" onclick="newChat()">
            + New Chat
        </button>

        <div class="chat-history" id="chatHistory"></div>

    </div>


    <!-- MAIN -->

    <div class="main">

        <!-- HEADER -->

        <div class="header">
            <h2>AI Website RAG Chatbot</h2>
            <p>Real World AI Project</p>
        </div>

        <!-- URL PROCESS -->

        <div class="top-section">

            <input id="urlBox" placeholder="Enter Website URL">

            <button onclick="processWebsite()">
                Process Website
            </button>

            <p id="status"></p>

        </div>

        <!-- PDF SECTION -->

        <div class="pdf-section">

            <input type="file" id="pdfFile" accept=".pdf">

            <button onclick="uploadPDF()">
                Upload PDF
            </button>

        </div>

        <!-- CHAT -->

        <div class="chat-box" id="chatBox"></div>

        <!-- QUESTION INPUT -->

        <div class="bottom">

            <input id="questionBox" placeholder="Ask question">

            <button id="sendButton" onclick="askQuestion()">
                Send
            </button>

        </div>

    </div>

</div>



<script>

let isProcessing = false
let chatCounter = 1

/* NEW CHAT */

function newChat(){
    document.getElementById("chatBox").innerHTML = ""
}

/* PROCESS WEBSITE */

async function processWebsite(){

    let website = document.getElementById("urlBox").value.trim()

    if(website===""){
        alert("Enter website URL")
        return
    }

    document.getElementById("status").innerHTML = "Processing..."

    let response = await fetch("http://127.0.0.1:8000/process-url",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            url: website
        })

    })

    let data = await response.json()

    document.getElementById("status").innerHTML = data.message
}

/* UPLOAD PDF */

async function uploadPDF(){

    let fileInput = document.getElementById("pdfFile")

    if(fileInput.files.length === 0){
        alert("Choose PDF first")
        return
    }

    let formData = new FormData()

    formData.append("file", fileInput.files[0])

    document.getElementById("status").innerHTML = "Uploading PDF..."

    try{

        let response = await fetch("http://127.0.0.1:8000/upload-pdf",{
            method:"POST",
            body: formData
        })

        let data = await response.json()

        document.getElementById("status").innerHTML = data.message
    }

    catch(error){
        document.getElementById("status").innerHTML = "PDF upload failed"
    }
}

/* ASK QUESTION */

async function askQuestion(){

    if(isProcessing===true){
        return
    }

    let question = document.getElementById("questionBox").value.trim()

    if(question===""){
        return
    }

    isProcessing = true

    let sendButton = document.getElementById("sendButton")
    sendButton.disabled = true

    let chat = document.getElementById("chatBox")

    /* sidebar history */

    let history = document.getElementById("chatHistory")

    history.innerHTML += `
        <div class="history-item">
            Chat ${chatCounter}
        </div>
    `

    chatCounter++

    /* user message */

    chat.innerHTML += `
        <div class="message user">${question}</div>
    `

    let loadingId = "loading"

    chat.innerHTML += `
        <div class="message ai" id="${loadingId}">
            AI thinking...
            <div class="typing-dots">
                <span>.</span>
                <span>.</span>
                <span>.</span>
            </div>
        </div>
    `

    chat.scrollTop = chat.scrollHeight

    try{

        let response = await fetch("http://127.0.0.1:8000/ask-question",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({
                question: question
            })

        })

        let data = await response.json()

        document.getElementById(loadingId).remove()

        chat.innerHTML += `
            <div class="message ai">${data.answer}</div>
        `

    }

    catch(error){

        document.getElementById(loadingId).remove()

        chat.innerHTML += `
            <div class="message ai">
                Backend Error
            </div>
        `
    }

    document.getElementById("questionBox").value = ""

    chat.scrollTop = chat.scrollHeight

    sendButton.disabled = false

    isProcessing = false
}

/* ENTER KEY */

document.getElementById("questionBox").addEventListener("keypress", function(event){

    if(event.key==="Enter"){
        event.preventDefault()
        askQuestion()
    }

})

</script>

</body>
</html>
